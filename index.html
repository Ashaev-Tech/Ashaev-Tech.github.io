  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: ${E.bg}; color: ${E.text}; font-family: ${V.body}; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: ${E.bg}; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes lineGrow {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }
  .nav-link {
    background: none; border: none; cursor: pointer;
    font-family: ${V.body}; font-size: 0.72rem; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: ${E.muted}; transition: color 0.2s;
    padding: 0; position: relative;
  }
  .nav-link::after {
    content: ''; position: absolute; bottom: -3px; left: 0; right: 0;
    height: 1px; background: ${E.text}; transform: scaleX(0);
    transform-origin: left; transition: transform 0.25s ease;
  }
  .nav-link:hover { color: ${E.text}; }
  .nav-link:hover::after, .nav-link.active::after { transform: scaleX(1); }
  .nav-link.active { color: ${E.text}; }
  .tag {
    display: inline-block;
    font-family: ${V.mono}; font-size: 0.68rem; font-weight: 400;
    letter-spacing: 0.04em; padding: 4px 10px;
    border: 1px solid ${E.border}; color: ${E.muted};
    transition: border-color 0.2s, color 0.2s;
  }
  .tag:hover { border-color: ${E.borderHover}; color: ${E.text}; }
  .exp-card {
    border: 1px solid ${E.border};
    transition: border-color 0.3s, background 0.3s;
    cursor: pointer;
  }
  .exp-card:hover { border-color: ${E.borderHover}; background: ${E.surfaceHover}; }
  .exp-card.open { border-color: rgba(255,255,255,0.13); }
  .skill-row {
    border-bottom: 1px solid ${E.border};
    transition: background 0.2s;
    padding: 1.5rem 0;
  }
  .skill-row:first-child { border-top: 1px solid ${E.border}; }
  .skill-row:hover { background: ${E.surfaceHover}; }
  .contact-item {
    border: 1px solid ${E.border};
    transition: border-color 0.25s, background 0.25s;
    padding: 1.5rem;
  }
  .contact-item:hover { border-color: ${E.borderHover}; background: ${E.surfaceHover}; }
  .dl-btn {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: ${V.body}; font-size: 0.78rem; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: ${E.bg}; background: ${E.text};
    border: none; cursor: pointer; padding: 14px 32px;
    text-decoration: none;
    transition: opacity 0.2s, transform 0.2s;
  }
  .dl-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .dl-btn:active { transform: translateY(0); }
  .copy-btn {
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    color: ${E.muted}; transition: color 0.2s;
    font-family: ${V.mono}; font-size: 0.82rem;
    padding: 0;
  }
  .copy-btn:hover { color: ${E.text}; }
  @media (max-width: 768px) {
    .desktop-nav { display: none !important; }
    .hamburger { display: flex !important; }
    .hero-grid { grid-template-columns: 1fr !important; }
    .stats-row { flex-direction: column; gap: 2rem !important; }
    .contact-grid { grid-template-columns: 1fr !important; }
  }
  @media (min-width: 769px) {
    .hamburger { display: none !important; }
    .mobile-menu { display: none !important; }
  }
